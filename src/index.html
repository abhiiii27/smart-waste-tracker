<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMART WASTE SEGREGATION & RECYCLING TRACKER</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>
    <div class="bg-icons" id="bg-icons" aria-hidden="true"></div>
  </div>

  <main class="hero" aria-labelledby="main-title">
    <div class="hero-inner">
      <p class="eyebrow">Sustainable Cities Initiative</p>
      <h1 id="main-title">SMART WASTE SEGREGATION &amp; RECYCLING TRACKER</h1>
      <p class="tagline">Encouraging smarter waste segregation for a cleaner and sustainable future.</p>

      <section class="login-card" aria-label="Login">
        <form class="login-form" id="login-form" autocomplete="on">
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="xyz@gmail.com" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="****" required />
          </label>
          <button class="btn" type="submit">Login</button>
        </form>
        <p class="login-error" id="login-error" aria-live="polite"></p>
        <div class="login-note">Secure access for citizens and administrators.</div>
        <div class="form-links">
          <span>New here?</span>
          <a class="text-link" href="/register.html">Create an account</a>
        </div>
        <div class="quick-links" aria-label="Quick links">
          <a class="text-link" href="/dashboard.html">Dashboard</a>
          <a class="text-link" href="/scan.html">Scan</a>
          <a class="text-link" href="/urban.html">Urban</a>
          <a class="text-link" href="/rural.html">Rural</a>
          <a class="text-link" href="/participation.html">Participation</a>
        </div>
      </section>
    </div>
  </main>

  <script src="/assets/js/script.js"></script>
</body>
</html>
